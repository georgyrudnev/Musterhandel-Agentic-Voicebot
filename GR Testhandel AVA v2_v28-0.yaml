botFlow:
  name: GR Testhandel AVA v2
  description: ""
  division: Georgy
  startUpRef: "/botFlow/bots/bot[Standard-Bot_10]"
  defaultLanguage: de-de
  supportedLanguages:
    de-de:
      defaultLanguageSkill:
        noValue: true
      speechToText:
        engine:
          name: Genesys Enhanced v2
          defaultEngine: true
    en-us:
      defaultLanguageSkill:
        noValue: true
      speechToText:
        engine:
          name: Genesys Enhanced v2
          defaultEngine: true
  variables:
    - booleanVariable:
        name: Flow.AdresseNennen
        initialValue:
          lit: false
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.Anliegen
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - integerVariable:
        name: Flow.Anliegen_Versuch
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.exitReason
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - integerVariable:
        name: Flow.i
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.intent
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.mar
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.Markt_DT
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.MarktPLZ_DT
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Flow.MarktStadt_DT
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - integerVariable:
        name: Flow.Product_Q_AVA
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - integerVariable:
        name: Flow.Telefon_Kundenservice
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - integerVariable:
        name: Flow.y
        initialValue:
          noValue: true
        isInput: false
        isOutput: false
    - stringVariable:
        name: Slot.erkanntePLZ
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - stringVariable:
        name: Slot.Märkte
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - stringVariable:
        name: Slot.OrderNo1
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - stringVariable:
        name: Slot.Produktkategorie_Essen
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - stringVariable:
        name: Slot.Produktname
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - stringVariable:
        name: Slot.Produkttyp
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
    - decimalVariable:
        name: Slot.Telefon_Kundenservice
        initialValue:
          noValue: true
        isInput: true
        isOutput: true
  settingsActionDefaults:
    callGuide:
      voiceProcessingPrompt:
        exp: MakeCommunication(PromptSystem.processing_keyboard)
    askForIntent:
      voiceEndOfInputTimeout:
        lit:
          seconds: 1
    askForSlot:
      voiceEndOfInputTimeout:
        lit:
          seconds: 1
    askForBoolean:
      voiceEndOfInputTimeout:
        lit:
          seconds: 1
    loopAnythingElse:
      voiceEndOfInputTimeout:
        lit:
          seconds: 1
  settingsErrorHandling:
    errorHandling:
      exit:
        none: true
    enableAgentEscalation:
      lit: true
    errorEventHandover:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"An error occurred. Let me connect you to a real person.\"), \n    MakeCommunication(\n      \"Leider ist ein Fehler aufgetreten. Bitte warten Sie kurz, ich werde Sie zu einer Person durchstellen, die Ihnen helfen kann.\")), \n  MakeCommunication(\n    \"Leider ist ein Fehler aufgetreten. Bitte warten Sie kurz, ich werde Sie zu einer Person durchstellen, die Ihnen helfen kann.\"))"
    agentEscalationConfirmation:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"You want to talk to our representative. Is that correct?\"), \n    MakeCommunication(\n      \"Sie möchten mit einem Berater sprechen. Ist das richtig?\")), \n  MakeCommunication(\n    \"Sie möchten mit einem Berater sprechen. Ist das richtig?\"))"
    agentEscalationHandover:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Please wait a second while I connect you.\"), \n    MakeCommunication(\n      \"Bitte warten Sie kurz, ich werde Sie durchstellen.\")), \n  MakeCommunication(\n    \"Bitte warten Sie kurz, ich werde Sie durchstellen.\"))"
    recognitionFailureEventHandover:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I cannot understand you. Let me connect you to a real person.\"), \n    MakeCommunication(\n      \"Ich kann Sie leider nur schlecht verstehen. Bitte warten Sie kurz, ich werde Sie zu einer Person durchstellen, die Ihnen helfen kann.\")), \n  MakeCommunication(\n    \"Ich kann Sie leider nur schlecht verstehen. Bitte warten Sie kurz, ich werde Sie zu einer Person durchstellen, die Ihnen helfen kann.\"))"
    recognitionFailureEventHandling:
      exit:
        none: true
    agentEscalationHandling:
      exit:
        none: true
  settingsPrompts:
    ensureAudioInPrompts: false
    promptMediaToValidate:
      - mediaType: audio
      - mediaType: tts
  tasks:
    - task:
        name: PLZ Zuordnung
        refId: PLZ Zuordnung_53
        actions:
          - updateData:
              name: Remove whitespace
              statements:
                - string:
                    variable: Slot.erkanntePLZ
                    value:
                      exp: Replace(Slot.erkanntePLZ, " ", "")
          - switch:
              name: Länge PLZ Eingabe
              evaluate:
                firstTrue:
                  default:
                    actions:
                      - endTask:
                          name: End Task
                          outputPath:
                            name: Fehler
                  cases:
                    - case:
                        value:
                          exp: Length(Slot.erkanntePLZ) == 5
                    - case:
                        value:
                          exp: Length(Slot.erkanntePLZ) == 4
                        actions:
                          - updateData:
                              name: Füge 0 an Anfang
                              statements:
                                - string:
                                    variable: Slot.erkanntePLZ
                                    value:
                                      exp: "\"0\" + Slot.erkanntePLZ"
          - communicate:
              name: Communicate PLZ
              communication:
                exp: "MakeCommunication(\n  \"Ich suche jetzt einen Markt in ihrer Nähe für ihre P.L.Z\", \n  ToCommunication(ResolveSlot(Slot.erkanntePLZ), Format.String.playChars), \n  \"raus\")"
          - dataTableLookup:
              name: Data Table Lookup
              lookupValue:
                exp: Slot.erkanntePLZ
              dataTable:
                Metro:
                  foundOutputs:
                    nearest_market_plz:
                      var: Flow.MarktPLZ_DT
                    nearest_market_city:
                      var: Flow.MarktStadt_DT
                    nearest_market_name:
                      var: Flow.Markt_DT
                  failureOutputs:
                    errorType:
                      noValue: true
                    errorMessage:
                      noValue: true
              outputs:
                found:
                  actions:
                    - askForBoolean:
                        name: Ask for Yes / No
                        question:
                          exp: "MakeCommunication(\n  \"Soll ich Sie mit\", \n  ToCommunication(Flow.Markt_DT), \n  \"in \", \n  ToCommunication(Flow.MarktStadt_DT), \n  ToCommunication(Flow.MarktPLZ_DT, Format.String.playChars), \n  \"verbinden?\")"
                        noInput:
                          exp: "MakeCommunication(\n  \"Sagen Sie \\\"ja\\\", wenn Sie fortfahren möchten, oder \\\"nein\\\", wenn nicht.\")"
                        noMatch:
                          exp: "MakeCommunication(\n  \"Sagen Sie \\\"Ja\\\" oder \\\"Nein\\\". Möchten Sie fortfahren?\")"
                        voiceEndOfInputTimeout:
                          noValue: true
                        outputs:
                          "yes":
                            actions:
                              - communicate:
                                  name: Communicate
                                  communication:
                                    exp: "MakeCommunication(\n  \"Verbindung erfolgreich!\")"
                          "no":
                            actions:
                              - communicate:
                                  name: Communicate
                                  communication:
                                    exp: "MakeCommunication(\n  \"Sie haben Nein ausgewählt.\")"
                              - clearSlot:
                                  name: Clear Slot
                                  slots:
                                    - slot:
                                        name: erkanntePLZ
                                    - slot:
                                        name: Märkte
                              - endTask:
                                  name: End Task
                                  outputPath:
                                    name: Anderer Markt
                          maxNoInputs:
                            enabled: false
                          maxNoMatches:
                            enabled: false
                    - endTask:
                        name: End Task
                        outputPath:
                          name: default
                notFound:
                  actions:
                    - communicate:
                        name: Communicate
                        communication:
                          exp: "MakeCommunication(\n  \"Ich habe ihre P.L.Z leider nicht gefunden. \", \n  \"Versuchen Sie es mit einer anderen PLZ.\")"
                    - clearSlot:
                        name: Clear Slot
                        slots:
                          - slot:
                              name: erkanntePLZ
                          - slot:
                              name: Märkte
                    - endTask:
                        name: End Task
                        outputPath:
                          name: Anderer Markt
                failure:
                  actions:
                    - communicate:
                        name: Communicate
                        communication:
                          exp: "MakeCommunication(\n  \"Mir ist ein Fehler passiert.\")"
                    - endTask:
                        name: End Task
                        outputPath:
                          name: Fehler
        outputPaths:
          - outputPath:
              name: Fehler
          - outputPath:
              name: Anderer Markt
  settingsBotFlow:
    voiceProcessingPrompt:
      noValue: true
    initialPlaybackDelay:
      lit:
        ms: 100
    minimumPlaybackTime:
      lit:
        seconds: 1
    intentSettings:
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I think you want to contact your market, is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie möchten einen Markt kontaktieren. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie möchten einen Markt kontaktieren. Ist das korrekt?\"))"
          name: Markt kontaktieren
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I think you need information around a product, is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie möchten Information zu einem Produkt. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie möchten Information zu einem Produkt. Ist das korrekt?\"))"
          name: Produktinformation
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"You have an inquiry around our memberships, is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie haben ein Anliegen zu ihrem Kundenprofil. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie haben ein Anliegen zu ihrem Kundenprofil. Ist das korrekt?\"))"
          name: Profil
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I think you have a question around your delivery. Is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie haben eine Frage zu Ihrer Lieferung. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie haben eine Frage zu Ihrer Lieferung. Ist das korrekt?\"))"
          name: Lieferung
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I understood you want to become our member, is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie möchten Registrierung. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie möchten Registrierung. Ist das korrekt?\"))"
          name: Registrierung
      - intent:
          confirmation:
            exp: "MakeCommunication(\n  \"Ich glaube, Sie möchten Marktverfügbarkeit. Ist das korrekt?\")"
          name: Marktverfügbarkeit
      - intent:
          confirmation:
            exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I think you want to find the next market, is that correct?\"), \n    MakeCommunication(\n      \"Ich glaube, Sie möchten Marktstandort. Ist das korrekt?\")), \n  MakeCommunication(\n    \"Ich glaube, Sie möchten Marktstandort. Ist das korrekt?\"))"
          name: Marktstandort
    virtualAgentEnabled: true
  settingsUserInput:
    enableBargeIn:
      lit: true
    enableAutomaticQuickReplies:
      lit: true
    noMatchesMax:
      lit: 1
    noInputsMax:
      lit: 2
    noInputsTimeout:
      lit:
        seconds: 6
    speechToTextSpeechDetectionSensitivity:
      noValue: true
    speechToTextMaxSpeechTimeout:
      noValue: true
    enableIntentClassificationHinting:
      lit: false
    interDigitTimeout:
      lit:
        seconds: 3
    dtmfTerminatingCharacter:
      noValue: true
    confirmationRejectionsMax:
      lit: 2
    collectionLowConfidenceThreshold:
      exp: ToInt(20)
    collectionHighConfidenceThreshold:
      exp: ToInt(20)
    confirmationLowConfidenceThreshold:
      lit: 24
    noMatchApology:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Sorry.\"), \n    MakeCommunication(\n      \"Entschuldigen Sie bitte.\")), \n  MakeCommunication(\n    \"Entschuldigen Sie bitte.\"))"
    noInputApology:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I did not hear you.\"), \n    MakeCommunication(\n      \"Ich habe Sie leider nicht gehört.\")), \n  MakeCommunication(\n    \"Ich habe Sie leider nicht gehört.\"))"
    noToConfirmationApology:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"An error occurred\"), \n    MakeCommunication(\n      \"Mir ist ein Fehler unterlaufen.\")), \n  MakeCommunication(\n    \"Mir ist ein Fehler unterlaufen.\"))"
    confirmationNoMatchApology:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Please answer yes or no\"), \n    MakeCommunication(\n      \"Bitte antworten Sie mit 'Ja' oder 'Nein'.\")), \n  MakeCommunication(\n    \"Bitte antworten Sie mit 'Ja' oder 'Nein'.\"))"
    confirmationNoInputApology:
      exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"I did not hear you. Please answer yes or no.\"), \n    MakeCommunication(\n      \"Ich habe Sie leider nicht gehört. Bitte antworten Sie mit 'Ja' oder 'Nein'.\")), \n  MakeCommunication(\n    \"Ich habe Sie leider nicht gehört. Bitte antworten Sie mit 'Ja' oder 'Nein'.\"))"
  settingsKnowledge:
    GR Öffnungszeiten v2:
      knowledgeVersion:
        lit: v2
      maxNumOfAnswersReturned:
        lit: 1
      knowledgeInitialResponseSingle:
        noValue: true
      knowledgeAnswerContentType:
        lit: standard
      sendKnowledgeFeedback:
        lit: true
      knowledgeConfirmation:
        exp: "MakeCommunication(\n  \"Hat dies Ihre Frage beantwortet?\")"
      responseBias:
        lit: neutral
      knowledgeSettingsMode:
        lit: standard
  settingsVirtualAgent:
    summarization:
      lit: false
    assignWrapupCodes:
      lit: false
  bots:
    - bot:
        name: Standard-Bot
        refId: Standard-Bot_10
        actions:
          - updateData:
              name: Daten aktualisieren
              statements:
                - integer:
                    variable: Flow.Telefon_Kundenservice
                    value:
                      lit: 4915237709704
          - communicate:
              name: Communicate
              communication:
                exp: "MakeCommunication(\n  \"Hallo.\")"
          - loop:
              name: Weiteres Anliegen?
              currentIndex:
                var: Flow.Anliegen_Versuch
              loopCount:
                lit: 2
              outputs:
                loop:
                  actions:
                    - askForIntent:
                        name: Anliegen erfragen
                        question:
                          exp: "If(AreEqual(true, Session.Language, \"de-de\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Haben Sie eine Frage zu einem Produkt oder möchten Sie mit Ihrem Metro Markt verbunden werden?\"), \n    MakeCommunication(\n      \"Haben Sie eine Frage zu einem Produkt oder möchten Sie mit Ihrem Handelsmarkt verbunden werden?\")), \n  If(AreEqual(true, Session.Language, \"en-us\"), \n    ToMultimodalCommunication(\n      MakeCommunication(\n        \"Do you have a question around a product or do you want to be connected to your trading-market?\"), \n      MakeCommunication(\n        \"Haben Sie eine Frage zu einem Produkt oder möchten Sie mit Ihrem Handelsmarkt verbunden werden?\")), \n    MakeCommunication(\n      \"Haben Sie eine Frage zu einem Produkt oder möchten Sie mit Ihrem Handelsmarkt verbunden werden?\")))"
                        knowledgeSearchResult:
                          noValue: true
                        noInput:
                          exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Describe your intent with a short sentence like \\\"Connect me to my market\\\" or \\\"Have a question about a product\\\"\"), \n    MakeCommunication(\n      \"Beschreiben deine Anfrage mit einem kurzen Satz, z. B. \\\"Frage zum Markt\\\" oder \\\"Produktinformation\\\"..\")), \n  MakeCommunication(\n    \"Beschreiben deine Anfrage mit einem kurzen Satz, z. B. \\\"Frage zum Markt\\\" oder \\\"Produktinformation\\\"..\"))"
                        noMatch:
                          exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Please tell me again, what you would like to do\"), \n    MakeCommunication(\n      \"Sagen Sie mir bitte erneut, was Sie tun möchten.\")), \n  MakeCommunication(\n    \"Sagen Sie mir bitte erneut, was Sie tun möchten.\"))"
                        voiceEndOfInputTimeout:
                          noValue: true
                        outputs:
                          intents:
                            - intent:
                                name: Markt kontaktieren
                                actions:
                                  - communicate:
                                      name: Communicate
                                      communication:
                                        exp: "If(AreEqual(true, Session.Language, \"de-de\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Ich habe verstanden, dass sie einen Markt kontaktieren möchten.\"), \n    MakeCommunication(\n      \"Danke, ich verbinde Sie mit unserer Marktspezialistin\")), \n  If(AreEqual(true, Session.Language, \"en-us\"), \n    ToMultimodalCommunication(\n      MakeCommunication(\n        \"Thanks, let me connect you to our market localization specialist.\"), \n      MakeCommunication(\n        \"Danke, ich verbinde Sie mit unserer Marktspezialistin\")), \n    MakeCommunication(\n      \"Danke, ich verbinde Sie mit unserer Marktspezialistin\")))"
                                  - callAgenticVirtualAgent:
                                      name: Agentenbasierten virtuellen Agenten anrufen
                                      agenticVirtualAgent:
                                        Großhandel Markt Finder & Registrierung:
                                          ver_latestPublished:
                                            inputs:
                                              worktypeid_kartenbestellung:
                                                noValue: true
                                              kunden_anliegen:
                                                exp: Session.ActiveIntent
                                              kunde_plz:
                                                exp: Slot.erkanntePLZ
                                              zweiter_kontakt:
                                                noValue: true
                                            outputs:
                                              PostalCode:
                                                noValue: true
                                              Marketname.nearest_market_name:
                                                var: Slot.Märkte
                                              Marketname.nearest_market_plz:
                                                noValue: true
                                            exitReason:
                                              noValue: true
                                      outputs:
                                        success:
                                          actions:
                                            - decision:
                                                name: Decision
                                                condition:
                                                  exp: isNotSetOrEmpty(Slot.Märkte)
                                                outputs:
                                                  "yes":
                                                    actions:
                                                      - disconnect:
                                                          name: Trennen
                                        failure:
                                          actions:
                                            - communicate:
                                                name: Fehler
                                                communication:
                                                  exp: "If(AreEqual(true, Session.Language, \"de-de\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Mir ist ein Fehler passiert.\"), \n    MakeCommunication(\n      \"Mir ist ein Fehler passiert. \")), \n  If(AreEqual(true, Session.Language, \"en-us\"), \n    ToMultimodalCommunication(\n      MakeCommunication(\n        \"An error occurred. \"), \n      MakeCommunication(\n        \"Mir ist ein Fehler passiert. \")), \n    MakeCommunication(\n      \"Mir ist ein Fehler passiert. \")))"
                                        timeout:
                                          actions:
                                            - communicate:
                                                name: Fehler
                                                communication:
                                                  exp: "If(AreEqual(true, Session.Language, \"de-de\"), \n  ToMultimodalCommunication(\n    MakeCommunication(\n      \"Mir ist ein Fehler passiert.\"), \n    MakeCommunication(\n      \"Mir ist ein Fehler passiert. \")), \n  If(AreEqual(true, Session.Language, \"en-us\"), \n    ToMultimodalCommunication(\n      MakeCommunication(\n        \"An error occurred. \"), \n      MakeCommunication(\n        \"Mir ist ein Fehler passiert. \")), \n    MakeCommunication(\n      \"Mir ist ein Fehler passiert. \")))"
                                  - askForBoolean:
                                      name: Mit Markt verbinden_
                                      question:
                                        exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  MakeCommunication(\n    \"Do you want me to connect you to your market?\"), \n  MakeCommunication(\n    \"Soll ich dich mit deinem Markt verbinden?\"))"
                                      noInput:
                                        exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  MakeCommunication(\n    \"Say \\\"yes\\\" if you want to proceed or \\\"no\\\" if you don't.\"), \n  MakeCommunication(\n    \"Sagen Sie \\\"ja\\\", wenn Sie fortfahren möchten, oder \\\"nein\\\", wenn nicht.\"))"
                                      noMatch:
                                        exp: "If(AreEqual(true, Session.Language, \"en-us\"), \n  MakeCommunication(\n    \"Please say \\\"yes\\\" or \\\"no\\\".  Do you want to proceed?\"), \n  MakeCommunication(\n    \"Sagen Sie \\\"Ja\\\" oder \\\"Nein\\\". Möchten Sie fortfahren?\"))"
                                      voiceEndOfInputTimeout:
                                        lit:
                                          seconds: 3
                                      outputs:
                                        "yes":
                                          actions:
                                            - loopExit:
                                                name: Schleife beenden
                                        maxNoInputs:
                                          enabled: false
                                        maxNoMatches:
                                          enabled: false
                                enabled: true
                            - intent:
                                name: Produktinformation
                                actions:
                                  - updateData:
                                      name: Daten aktualisieren
                                      statements:
                                        - string:
                                            variable: Flow.intent
                                            value:
                                              exp: "\"Produktfrage\""
                                  - loop:
                                      name: Schleife
                                      currentIndex:
                                        var: Flow.Product_Q_AVA
                                      loopCount:
                                        lit: 1
                                      outputs:
                                        loop:
                                          actions:
                                            - callAgenticVirtualAgent:
                                                name: Agentenbasierten virtuellen Agenten anrufen
                                                agenticVirtualAgent:
                                                  Produktinformationen:
                                                    ver_latestPublished:
                                                      inputs:
                                                        kunden_anliegen:
                                                          exp: ToDisplayString(Flow.intent)
                                                        kunde_plz:
                                                          exp: ToDisplayString(ResolveSlot(Slot.erkanntePLZ))
                                                        zweiter_kontakt:
                                                          noValue: true
                                                        produkt_typ:
                                                          exp: ToDisplayString(ResolveSlot(Slot.Produkttyp))
                                                      outputs:
                                                        PostalCode:
                                                          var: Slot.erkanntePLZ
                                                        Marketname.nearest_market_name:
                                                          var: Slot.Märkte
                                                        Marketname.nearest_market_plz:
                                                          noValue: true
                                                      exitReason:
                                                        noValue: true
                                                outputs:
                                                  success:
                                                    actions:
                                                      - decision:
                                                          name: Decision
                                                          condition:
                                                            exp: isNotSetOrEmpty(Slot.Märkte)
                                                          outputs:
                                                            "yes":
                                                              actions:
                                                                - disconnect:
                                                                    name: Trennen
                                                  failure:
                                                    actions:
                                                      - communicate:
                                                          name: Fehler
